name: NodeJS with Grunt

on:
  push:
    branches: ['**']         # todas las ramas
  pull_request:
    branches: ['**']         # PRs desde/hacia cualquier rama

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'       # acelera instalaciones

      - name: Install deps
        run: npm ci          # usa package-lock; si no lo tienes, cambia a `npm install`

      - name: Build with Grunt
        run: npx grunt       # evita depender de grunt-cli global}

    - name: Build
      run: |
        npm install
        grunt
