name: CryBot CI

on:
  push:
    branches:
      - Principal
  pull_request:
    branches:
      - Principal
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN || 'dummy-ci-token' }}
      BASE_URL: https://example.com
      DRY_RUN: true
      ENABLE_WRITE_ACTIONS: false
      TONAPI_KEY: ${{ secrets.TONAPI_KEY }}
      ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
      RPC_URL: ${{ secrets.RPC_URL || 'https://ethereum.publicnode.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Runtime validation
        run: npm run validate

      - name: Wallet validation
        run: npm run validate:wallets

      - name: Structure audit
        run: npm run audit

      - name: Scanner validation
        run: npm run scanner

      - name: Export wallet manifest
        run: node src/services/exportWalletManifest.js wallet-manifest.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: crybot-wallet-manifest
          path: wallet-manifest.json
          retention-days: 14
