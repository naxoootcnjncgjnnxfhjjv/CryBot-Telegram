<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CryBot Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        background-color: #0b1622;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Welcome to <span style="color:#20c997;">CryBot</span></h2>
      <p>Loading your Telegram account...</p>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.expand();

      const user = tg.initDataUnsafe?.user;

      if (user) {
        window.location.href = `/dashboard?user=${user.id}&name=${encodeURIComponent(user.first_name)}`;
      } else {
        document.querySelector(".container").innerHTML = `
          <h2>Open CryBot from Telegram 📲</h2>
          <p>Please open this miniapp inside Telegram to continue.</p>
        `;
      }
    </script>
  </body>
</html>
